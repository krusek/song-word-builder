<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Word Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --border: #ccc;
    --bg-soft: rgba(127,127,127,0.08);
    --accent: #3a6df0;
    --warn: #c0392b;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    padding: 1rem 1.25rem;
  }
  header { flex: 0 0 auto; margin-bottom: 0.75rem; }
  h1 { font-size: 1.3rem; margin: 0 0 0.15rem; }
  p.sub { margin: 0; color: #888; font-size: 0.85rem; }

  .controls {
    margin: 0.6rem 0;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    flex: 0 0 auto;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .checkbox-row { font-size: 0.9rem; display: flex; align-items: center; gap: 0.4rem; }

  .layout {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 1rem;
    min-height: 0;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  .col { display: flex; flex-direction: column; min-height: 0; gap: 0.75rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }

  .field { display: flex; flex-direction: column; min-height: 0; }
  #arrangement-field { flex: 0 0 auto; }
  #piece-field { flex: 1 1 auto; min-height: 0; }
  .field-header { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; }
  .field-header label { margin-bottom: 0.3rem; }
  button.small { padding: 0.25rem 0.6rem; font-size: 0.78rem; }

  textarea {
    width: 100%;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    padding: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: none;
    background: var(--bg-soft);
  }
  #arrangement { height: 70px; }
  #piece { flex: 1 1 auto; min-height: 120px; }
  #whitespaceDebug {
    flex: 1 1 auto;
    min-height: 120px;
    margin: 0;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    background: var(--bg-soft);
  }
  #whitespaceDebug mark.sp { background: none; color: #888; }
  #whitespaceDebug mark.nbsp { background: rgba(58,109,240,0.25); border-radius: 2px; }
  #whitespaceDebug mark.tab { background: rgba(192,57,43,0.25); border-radius: 2px; }
  #whitespaceDebug mark.other { background: rgba(230,180,0,0.3); border-radius: 2px; }

  #output-wrap {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #output {
    flex: 1 1 auto;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.25rem;
    white-space: pre-wrap;
    font-size: 1.02rem;
  }
  .section-label {
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-top: 1.1rem;
    margin-bottom: 0.2rem;
  }
  .section-label:first-child { margin-top: 0; }
  .blank-slide {
    text-align: center;
    color: #999;
    font-size: 0.8rem;
    margin: 0.8rem 0;
    letter-spacing: 0.15em;
  }
  .missing {
    color: var(--warn);
    font-weight: 600;
    margin: 0.6rem 0;
  }
  .warnings {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--warn);
    flex: 0 0 auto;
  }
</style>
</head>
<body>

<header>
  <h1>Song Word Builder</h1>
  <p class="sub">Type an arrangement and a piece definition. Lyrics update live on the right.</p>
</header>

<div class="controls">
  <button class="secondary" id="loadExample">Load Example</button>
  <button class="secondary" id="clearAll">Clear</button>
  <button class="secondary" id="importPdfBtn">Import PDF&hellip;</button>
  <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
  <label class="checkbox-row"><input type="checkbox" id="showLabels" checked> Show section labels</label>
  <span id="pdfStatus" style="font-size:0.85rem; color:#888;"></span>
</div>

<div class="layout">
  <div class="col">
    <div class="field" id="arrangement-field">
      <label for="arrangement">Arrangement (comma-separated)</label>
      <textarea id="arrangement" placeholder="Blank, Verse 1, Chorus, Verse 2, Chorus, Blank"></textarea>
    </div>
    <div class="field" id="piece-field">
      <div class="field-header">
        <label for="piece">Piece Definition (labelled sections)</label>
        <div style="display:flex; gap:0.4rem;">
          <button class="secondary small" id="inspectWhitespace" type="button">Inspect whitespace</button>
          <button class="secondary small" id="fixLineBreaks" type="button">Add new lines back</button>
        </div>
      </div>
      <textarea id="piece" placeholder="Verse 1&#10;Lyric line one&#10;Lyric line two&#10;&#10;Chorus&#10;Chorus lyric line"></textarea>
      <pre id="whitespaceDebug" style="display:none;"></pre>
    </div>
  </div>

  <div id="output-wrap">
    <label>Output</label>
    <div id="output">Output will appear here.</div>
    <div id="warnings" class="warnings"></div>
  </div>
</div>

<script>
const HEADER_TOKEN = '(?:verse|chorus|bridge|tag|refrain|intro|outro|pre-?chorus|post-?chorus|interlude|ending|instrumental|vamp|coda|turnaround)\\s*\\d*';
const HEADER_LINE_RE = new RegExp('^' + HEADER_TOKEN + '$', 'i');

function parseStrict(text) {
  const sections = {};
  let current = null;
  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trim();
    if (HEADER_LINE_RE.test(line)) {
      current = { label: line, lines: [] };
      sections[line.toLowerCase()] = current;
    } else if (current) {
      current.lines.push(raw.trimEnd());
    }
  }
  trimSections(sections);
  return sections;
}

// Some sources (e.g. copying straight out of Proclaim's own input box) collapse
// real line breaks into single spaces, and blank lines into double spaces,
// instead of preserving newlines. Scan the raw text for header keywords
// wherever they occur (not just at the start of a line) and split on those,
// so it doesn't matter whether a blank line originally preceded each header.
function parseFlattened(text) {
  const globalRe = new RegExp('\\b(' + HEADER_TOKEN + ')\\b', 'gi');
  const matches = [...text.matchAll(globalRe)];
  const sections = {};
  for (let i = 0; i < matches.length; i++) {
    const m = matches[i];
    const label = m[1].replace(/\s+/g, ' ').trim();
    const start = m.index + m[0].length;
    const end = i + 1 < matches.length ? matches[i + 1].index : text.length;
    const body = text.slice(start, end).replace(/[ \t ]{2,}/g, '\n\n');
    const lines = body.split(/\r?\n/).map(l => l.trim());
    sections[label.toLowerCase()] = { label, lines };
  }
  trimSections(sections);
  return sections;
}

function trimSections(sections) {
  for (const key in sections) {
    const arr = sections[key].lines;
    while (arr.length && arr[0].trim() === '') arr.shift();
    while (arr.length && arr[arr.length - 1].trim() === '') arr.pop();
  }
}

// Proclaim's own input box replaces every real newline with U+2029
// (paragraph separator) when copied out, rather than dropping it or turning
// it into a space. Undo that first so normal line-based parsing just works.
function normalizeLineBreaks(text) {
  return text.replace(/\u2029/g, '\n');
}

function parsePiece(text) {
  const normalized = normalizeLineBreaks(text);
  const strict = parseStrict(normalized);
  if (Object.keys(strict).length >= 2) return strict;
  const loose = parseFlattened(normalized);
  return Object.keys(loose).length > Object.keys(strict).length ? loose : strict;
}

function parseArrangement(text) {
  return text.split(',').map(s => s.trim()).filter(s => s.length > 0);
}

function generate() {
  const arrangementText = document.getElementById('arrangement').value;
  const pieceText = document.getElementById('piece').value;
  const showLabels = document.getElementById('showLabels').checked;

  const sections = parsePiece(pieceText);
  const tokens = parseArrangement(arrangementText);

  const output = document.getElementById('output');
  const warningsEl = document.getElementById('warnings');
  output.innerHTML = '';
  const missing = [];

  if (tokens.length === 0) {
    output.textContent = 'Enter an arrangement above.';
    warningsEl.textContent = '';
    return;
  }

  for (const token of tokens) {
    if (token.toLowerCase() === 'blank') {
      const div = document.createElement('div');
      div.className = 'blank-slide';
      div.textContent = '· BLANK ·';
      output.appendChild(div);
      continue;
    }
    const sec = sections[token.toLowerCase()];
    if (!sec) {
      missing.push(token);
      const div = document.createElement('div');
      div.className = 'missing';
      div.textContent = `⚠ "${token}" not found in piece definition`;
      output.appendChild(div);
      continue;
    }
    if (showLabels) {
      const labelDiv = document.createElement('div');
      labelDiv.className = 'section-label';
      labelDiv.textContent = sec.label;
      output.appendChild(labelDiv);
    }
    const bodyDiv = document.createElement('div');
    bodyDiv.textContent = sec.lines.join('\n');
    output.appendChild(bodyDiv);
  }

  warningsEl.textContent = missing.length
    ? `Missing sections: ${[...new Set(missing)].join(', ')}`
    : '';
}

const EXAMPLE_ARRANGEMENT = "Blank, Verse 1, Chorus, Verse 2, Chorus, Blank, Bridge, Chorus, Tag, Blank,";

const EXAMPLE_PIECE = `Verse 1
This is the first line of verse one
This is the second line of verse one

Verse 2
This is the first line of verse two
This is the second line of verse two

Chorus
This is the first line of the chorus
This is the second line of the chorus

Bridge
This is the first line of the bridge
This is the second line of the bridge

Tag
This is the tag line, repeated for emphasis`;

const arrangementEl = document.getElementById('arrangement');
const pieceEl = document.getElementById('piece');
const showLabelsEl = document.getElementById('showLabels');

['input', 'keyup', 'change', 'paste'].forEach(evt => {
  arrangementEl.addEventListener(evt, generate);
  pieceEl.addEventListener(evt, generate);
});
showLabelsEl.addEventListener('change', generate);

// Fallback poller in case some input path (e.g. dictation, some IME/extension setups)
// doesn't fire standard input events.
let lastArrangement = arrangementEl.value;
let lastPiece = pieceEl.value;
let lastShowLabels = showLabelsEl.checked;
setInterval(() => {
  if (arrangementEl.value !== lastArrangement || pieceEl.value !== lastPiece || showLabelsEl.checked !== lastShowLabels) {
    lastArrangement = arrangementEl.value;
    lastPiece = pieceEl.value;
    lastShowLabels = showLabelsEl.checked;
    generate();
  }
}, 200);

document.getElementById('fixLineBreaks').addEventListener('click', () => {
  pieceEl.value = reinsertLineBreaks(pieceEl.value);
  generate();
});

const whitespaceDebugEl = document.getElementById('whitespaceDebug');
document.getElementById('inspectWhitespace').addEventListener('click', () => {
  const visible = whitespaceDebugEl.style.display !== 'none';
  if (visible) {
    whitespaceDebugEl.style.display = 'none';
    pieceEl.style.display = '';
  } else {
    whitespaceDebugEl.innerHTML = annotateWhitespace(pieceEl.value);
    whitespaceDebugEl.style.display = '';
    pieceEl.style.display = 'none';
  }
});

// Renders text with every non-visible-space character tagged, so you can see
// exactly what a paste contains (e.g. a regular space vs a non-breaking
// space vs a tab) without guessing from how it looks in a chat window.
function annotateWhitespace(text) {
  let html = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code === 0x0A) {
      html += '\n';
    } else if (code === 0x20) {
      html += '<mark class="sp" title="regular space (U+0020)">&middot;</mark>';
    } else if (code === 0xA0) {
      html += '<mark class="nbsp" title="non-breaking space (U+00A0)">NBSP</mark>';
    } else if (code === 0x09) {
      html += '<mark class="tab" title="tab (U+0009)">TAB</mark>';
    } else if (code < 0x20 || code === 0x2028 || code === 0x2029 || code === 0xFEFF || (code >= 0x2000 && code <= 0x200F)) {
      const label = 'U+' + code.toString(16).toUpperCase().padStart(4, '0');
      html += `<mark class="other" title="${label}">${label}</mark>`;
    } else {
      html += ch.replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }
  }
  return html;
}

function reinsertLineBreaks(text) {
  return normalizeLineBreaks(text);
}

// ---- PDF import ----
// Renders each page to a canvas and samples the pixel color under each text
// run (from getTextContent) to classify it red vs. black, since pdf.js text
// items don't carry color directly. Red bracketed lines like "[Verse 1: Dustin]"
// become section headers (the "who" after the colon is discarded); red text
// inside an otherwise-black line is dropped as ad-lib/direction, keeping only
// the black words. Repeated header names are reused as-is when their lyric
// content is identical to an earlier occurrence, and suffixed ("Interlude 2")
// when it genuinely differs, so the arrangement can reference the right one.
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// Classify a text run as red or black by rendering the page to a canvas and
// averaging the pixel color *within that run's bounding box, ignoring
// near-white background pixels*. Excluding the background is what makes
// this reliable: a plain average across the whole box gets diluted by all
// the surrounding white space (especially for short runs), washing out the
// red/black difference. Averaging only the non-background ("ink") pixels
// removes that dilution, so runs consistently and clearly separate into a
// red cluster (~240, ~50, ~50) and a black cluster (~60, ~60, ~60).
async function extractColoredLines(pdf) {
  const allLines = [];
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const scale = 3;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    const textContent = await page.getTextContent();

    const items = textContent.items
      .filter(it => it.str.trim().length > 0)
      .map(it => {
        const combined = pdfjsLib.Util.transform(viewport.transform, it.transform);
        const x = combined[4];
        const yBaseline = combined[5];
        const fontHeight = Math.hypot(combined[2], combined[3]) || 10;
        // it.width is in page-space points (unscaled by viewport); multiply
        // by the page's own render scale, not a glyph-transform-derived
        // factor — that double-applies font-size scaling and produces a box
        // many times too wide, bleeding into unrelated text later in the row.
        const w = Math.max(2, Math.round((it.width || 0) * scale));
        const h = Math.max(2, Math.round(fontHeight * 1.1));
        const boxX = Math.max(0, Math.round(x));
        const boxY = Math.max(0, Math.round(yBaseline - fontHeight));
        const bw = Math.min(w, canvas.width - boxX);
        const bh = Math.min(h, canvas.height - boxY);
        let isRed = false;
        if (bw > 0 && bh > 0) {
          const data = ctx.getImageData(boxX, boxY, bw, bh).data;
          let sumR = 0, sumG = 0, sumB = 0, n = 0;
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i + 1], b = data[i + 2];
            if (r > 250 && g > 250 && b > 250) continue;
            sumR += r; sumG += g; sumB += b; n++;
          }
          if (n > 0) {
            const avgR = sumR / n, avgG = sumG / n, avgB = sumB / n;
            isRed = (avgR - avgG) > 20 && (avgR - avgB) > 20;
          }
        }
        return { str: it.str, x, y: yBaseline, isRed };
      });

    // Canvas/viewport space has y increasing downward, so an ascending sort
    // by y gives top-to-bottom reading order. Cluster into rows first (a
    // single comparator that judges "same row" isn't a valid total order
    // and scrambles items with a wide range of y-coordinates), then sort
    // each row left-to-right by x.
    items.sort((a, b) => a.y - b.y);
    const rows = [];
    for (const it of items) {
      const row = rows.find(r => Math.abs(it.y - r.y) < 4);
      if (row) {
        row.items.push(it);
      } else {
        rows.push({ y: it.y, items: [it] });
      }
    }
    for (const row of rows) {
      row.items.sort((a, b) => a.x - b.x);
      allLines.push({ y: row.y, spans: row.items.map(it => ({ text: it.str, isRed: it.isRed })) });
    }
  }
  return allLines;
}

function parsePdfLines(lines) {
  const segments = [];
  let current = null;
  for (const line of lines) {
    const fullText = line.spans.map(s => s.text).join(' ').replace(/\s+/g, ' ').trim();
    const allRed = line.spans.every(s => s.isRed);
    const headerMatch = allRed && fullText.match(/^\[(.+)\]$/);
    if (headerMatch) {
      const inner = headerMatch[1];
      const colonIdx = inner.indexOf(':');
      const label = (colonIdx === -1 ? inner : inner.slice(0, colonIdx)).trim();
      current = { label, lines: [] };
      segments.push(current);
      continue;
    }
    const blackText = line.spans.filter(s => !s.isRed).map(s => s.text).join('').replace(/\s+/g, ' ').trim();
    if (blackText && current) {
      current.lines.push(blackText);
    }
  }
  return segments;
}

function buildProclaimText(segments) {
  const variantsByLabel = new Map();
  const pieceOrder = [];
  const arrangementTokens = [];

  for (const seg of segments) {
    const body = seg.lines.join('\n').trim();
    if (!variantsByLabel.has(seg.label)) variantsByLabel.set(seg.label, []);
    const variants = variantsByLabel.get(seg.label);
    let match = variants.find(v => v.body === body);
    if (!match) {
      const variantLabel = variants.length === 0 ? seg.label : `${seg.label} ${variants.length + 1}`;
      match = { body, variantLabel };
      variants.push(match);
      pieceOrder.push({ label: variantLabel, lines: seg.lines });
    }
    arrangementTokens.push(match.variantLabel);
  }

  const arrangementText = arrangementTokens.join(', ');
  const pieceText = pieceOrder.map(s => s.label + '\n' + s.lines.join('\n')).join('\n\n');
  return { arrangementText, pieceText };
}

async function handlePdfFile(file) {
  const statusEl = document.getElementById('pdfStatus');
  statusEl.textContent = 'Reading PDF…';
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const lines = await extractColoredLines(pdf);
    const segments = parsePdfLines(lines);
    if (segments.length === 0) {
      statusEl.textContent = 'No red [Section: Who] headers found — check the PDF matches the expected format.';
      return;
    }
    const { arrangementText, pieceText } = buildProclaimText(segments);
    arrangementEl.value = arrangementText;
    pieceEl.value = pieceText;
    generate();
    statusEl.textContent = `Imported ${segments.length} segment${segments.length === 1 ? '' : 's'} from ${pdf.numPages} page${pdf.numPages === 1 ? '' : 's'}.`;
  } catch (err) {
    statusEl.textContent = 'Could not read that PDF: ' + err.message;
  }
}

document.getElementById('importPdfBtn').addEventListener('click', () => {
  document.getElementById('pdfInput').click();
});
document.getElementById('pdfInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) handlePdfFile(file);
  e.target.value = '';
});

document.getElementById('clearAll').addEventListener('click', () => {
  arrangementEl.value = '';
  pieceEl.value = '';
  generate();
});
document.getElementById('loadExample').addEventListener('click', () => {
  arrangementEl.value = EXAMPLE_ARRANGEMENT;
  pieceEl.value = EXAMPLE_PIECE;
  generate();
});
</script>
</body>
</html>
